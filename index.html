<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokédex</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" type="image/svg+xml"
        href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='46' fill='%23fff' stroke='%23222' stroke-width='6'/%3E%3Cpath d='M4 50 a46 46 0 0 1 92 0 Z' fill='%23EE1515' stroke='%23222' stroke-width='6'/%3E%3Crect x='4' y='46' width='92' height='8' fill='%23222'/%3E%3Ccircle cx='50' cy='50' r='14' fill='%23fff' stroke='%23222' stroke-width='6'/%3E%3C/svg%3E">
</head>

<body>
    <header id="topBar">
        <div class="brand">
            <svg class="brand-ball" viewBox="0 0 100 100" width="36" height="36" aria-hidden="true">
                <circle cx="50" cy="50" r="46" fill="#FFFFFF" stroke="#222" stroke-width="6"/>
                <path d="M4 50 a46 46 0 0 1 92 0 Z" fill="#EE1515" stroke="#222" stroke-width="6"/>
                <rect x="4" y="46" width="92" height="8" fill="#222"/>
                <circle cx="50" cy="50" r="14" fill="#FFFFFF" stroke="#222" stroke-width="6"/>
                <circle cx="50" cy="50" r="6" fill="#DDD"/>
            </svg>
            <svg class="brand-logo" viewBox="0 0 440 74" height="40" role="img" aria-label="POKÉDEX">
                <text x="50%" y="56" text-anchor="middle"
                    font-family="'Arial Black', 'Franklin Gothic Medium', Arial, sans-serif"
                    font-size="52" font-weight="900" letter-spacing="3"
                    fill="#FFCB05" stroke="#2A75BB" stroke-width="7"
                    paint-order="stroke">POKÉDEX</text>
            </svg>
        </div>

        <div class="search-wrap">
            <div class="search-mode" role="group" aria-label="Buscar por">
                <button type="button" class="mode-button active" data-mode="pokemon">Pokémon</button>
                <button type="button" class="mode-button" data-mode="ability">Habilidad</button>
            </div>
            <div class="search-field">
                <svg class="search-icon" viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
                    <circle cx="10.5" cy="10.5" r="6.5" fill="none" stroke="currentColor" stroke-width="2"/>
                    <line x1="15.5" y1="15.5" x2="21" y2="21" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                </svg>
                <input type="search" id="searchBox" placeholder="Buscar por nombre o número…" autocomplete="off"
                    role="combobox" aria-expanded="false" aria-controls="searchSuggestions"
                    aria-label="Buscar Pokémon por nombre, número o habilidad">
                <div id="searchSuggestions" role="listbox" aria-label="Sugerencias" hidden></div>
            </div>
        </div>
    </header>

    <div id="filtersBackdrop" hidden></div>

    <section id="filters" aria-label="Filtros">
        <div class="filters-header">
            <span>Filtros</span>
            <button id="filtersDone" type="button">Listo</button>
        </div>
        <div class="filter-group">
            <span class="filter-label">Generación</span>
            <div id="botones" role="group" aria-label="Filtrar por generación">
                <button id="gen1Button" class="gen-button">I</button>
                <button id="gen2Button" class="gen-button">II</button>
                <button id="gen3Button" class="gen-button">III</button>
                <button id="gen4Button" class="gen-button">IV</button>
                <button id="gen5Button" class="gen-button">V</button>
                <button id="gen6Button" class="gen-button">VI</button>
                <button id="gen7Button" class="gen-button">VII</button>
                <button id="gen8Button" class="gen-button">VIII</button>
                <button id="gen9Button" class="gen-button">IX</button>
            </div>
        </div>

        <div class="filter-group">
            <span class="filter-label">Tipo</span>
            <div id="typeFilter" role="group" aria-label="Filtrar por tipo">
                <button value="Acero"><img alt="Acero"></button>
                <button value="Agua"><img alt="Agua"></button>
                <button value="Bicho"><img alt="Bicho"></button>
                <button value="Dragón"><img alt="Dragón"></button>
                <button value="Eléctrico"><img alt="Eléctrico"></button>
                <button value="Fantasma"><img alt="Fantasma"></button>
                <button value="Fuego"><img alt="Fuego"></button>
                <button value="Hada"><img alt="Hada"></button>
                <button value="Hielo"><img alt="Hielo"></button>
                <button value="Lucha"><img alt="Lucha"></button>
                <button value="Normal"><img alt="Normal"></button>
                <button value="Planta"><img alt="Planta"></button>
                <button value="Psíquico"><img alt="Psíquico"></button>
                <button value="Roca"><img alt="Roca"></button>
                <button value="Siniestro"><img alt="Siniestro"></button>
                <button value="Tierra"><img alt="Tierra"></button>
                <button value="Veneno"><img alt="Veneno"></button>
                <button value="Volador"><img alt="Volador"></button>
            </div>
        </div>

        <div class="filter-group">
            <span class="filter-label">Formas</span>
            <div id="formFilter" role="group" aria-label="Filtrar por forma especial">
                <button id="megaFilterButton" class="gen-button form-chip" value="mega">Mega Evolución</button>
                <button id="gmaxFilterButton" class="gen-button form-chip" value="gmax">Gigamax</button>
            </div>
        </div>

    </section>

    <section class="results-bar" aria-label="Resultados">
        <button id="filtersToggle" type="button" aria-label="Abrir filtros" aria-expanded="false">
            <svg viewBox="0 0 24 24" width="16" height="16" aria-hidden="true">
                <path d="M3 5h18M6 12h12M10 19h4" fill="none" stroke="currentColor"
                    stroke-width="2.4" stroke-linecap="round"/>
            </svg>
            Filtros<span id="filtersCount" hidden></span>
        </button>
        <span id="resultCount" aria-live="polite"></span>
        <button id="clearFilters" hidden>Limpiar filtros</button>
    </section>

    <main></main>

    <div id="emptyState" hidden>
        <svg viewBox="0 0 100 100" width="72" height="72" aria-hidden="true" class="empty-ball">
            <circle cx="50" cy="50" r="46" fill="#FFFFFF" stroke="#C9CDD6" stroke-width="6"/>
            <path d="M4 50 a46 46 0 0 1 92 0 Z" fill="#E7E9EF" stroke="#C9CDD6" stroke-width="6"/>
            <rect x="4" y="46" width="92" height="8" fill="#C9CDD6"/>
            <circle cx="50" cy="50" r="14" fill="#FFFFFF" stroke="#C9CDD6" stroke-width="6"/>
        </svg>
        <p class="empty-title">No encontramos ningún Pokémon</p>
        <p class="empty-hint">Probá con otro nombre o quitá algún filtro.</p>
        <button id="emptyClear">Limpiar filtros</button>
    </div>

    <footer>
        <p>&copy; 2023 Pablo Gabriel Corvalán Nieto. Todos los derechos reservados.</p>
    </footer>

    <button id="scrollToTopButton" class="scroll-button" aria-label="Volver arriba">
        <svg class="scroll-image" viewBox="0 0 100 100" width="48" height="48" aria-hidden="true">
            <circle cx="50" cy="50" r="46" fill="#FFFFFF" stroke="#222" stroke-width="6"/>
            <path d="M4 50 a46 46 0 0 1 92 0 Z" fill="#EE1515" stroke="#222" stroke-width="6"/>
            <rect x="4" y="46" width="92" height="8" fill="#222"/>
            <circle cx="50" cy="50" r="14" fill="#FFFFFF" stroke="#222" stroke-width="6"/>
            <circle cx="50" cy="50" r="6" fill="#DDD"/>
        </svg>
    </button>

    <script>
        const scrollToTopButton = document.getElementById("scrollToTopButton");
        scrollToTopButton.addEventListener("click", () => {
            window.scrollTo({ top: 0, behavior: "smooth" });
        });
        window.addEventListener("scroll", () => {
            scrollToTopButton.classList.toggle("show", window.pageYOffset > 300);
        }, { passive: true });
    </script>
    <script src="forms-data.js"></script>
    <script src="badges.js"></script>
    <script src="detail.js"></script>
    <script src="script.js"></script>
</body>

</html>
