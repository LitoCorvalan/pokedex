                <style>
                        #typeFilter {
                                display: flex;
                                gap: 10px;
                                justify-content: center;
                                margin-top: 5px;
                        }
                        #typeFilter button {
                                width: 100px;
                                height: 25px;
                                padding: 0px;
                                display: flex;
                                align-items: center;
                                justify-content: center;
                                flex-direction: column;
                                border: none;
                                cursor: pointer;
                                background-color: transparent;
                        }
                        #typeFilter button:focus {
                                outline: none;
                        }
                        #typeFilter img {
                                max-width: 90px;
                                max-height: 50px;
                        }
                        #typeFilter button:hover img {
                                opacity: 0.85;
                        }
                        #typeFilter button:active {
                                opacity: #555;
                        }
                        #typeFilter button:active img {
                                transform: scale(0.95);
                        }
                        /*          BOTONES               */
                        #botones {
                                display: flex;
                                gap: 10px;
                                justify-content: center;
                                margin-top: 5px;
                        }
                        #botones button {
                                width: 100px;
                                height: 30px;
                                padding: 0px;
                                display: flex;
                                align-items: center;
                                justify-content: center;
                                flex-direction: column;
                                border: none;
                                cursor: pointer;
                                background-image: URL("https://www.pngall.com/wp-content/uploads/4/Pokeball-PNG-Download-Image.png");
                               /* background-color: transparent; */
                        }
                        #botones button:focus {
                                outline: none;
                        }
                        #botones img {
                                max-width: 90px;
                                max-height: 50px;
                        }
                        #botones button:hover img {
                                opacity: 0.85;
                        }
                        #botones button:active {
                                opacity: #555;
                        }
                        #botones button:active img {
                                transform: scale(0.95);
                        }
                        .gen-button {
                                display: flex;
                                justify-content: center;
                                align-items: center;
                                border: 1px solid rgb(0, 0, 0);
                                font-size: 17px;
                                font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
                                font: bold;
                                border-radius: 10%;
                                background-color: rgba(0, 0, 0, 0.034);
                                width: 100px;
                                height: 75px;
                        }
                        .gen-button:hover {
                                background-color: #ddd;
                        }
                        .gen-button.active {
                                background-color: #007bff;
                                color: #fff;
                                border-color: #007bff;
                        }
                        
                </style>
                <div id="botones">
                        <button id="gen1Button" class="gen-button">1° GEN</button>

                        <button id="gen8Button" class="gen-button">8° GEN</button>
                        <button id="gen9Button" class="gen-button">9° GEN</button>
                </div>
